<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Casa Monarca</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; padding: 40px 32px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { color: #c84c2a; margin: 0 0 4px 0; font-size: 22px; }
    .header p { color: #888; margin: 0; font-size: 13px; }
    h2 { margin: 0 0 8px 0; font-size: 18px; color: #222; }
    .sub { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #c84c2a; }
    button { width: 100%; background: #c84c2a; color: #fff; border: 0; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: #fee; color: #c00; border: 1px solid #fcc; }
    .alert-success { background: #efe; color: #060; border: 1px solid #cfc; }
    .back { display: block; text-align: center; margin-top: 16px; color: #888; font-size: 13px; text-decoration: none; }
    .back:hover { color: #c84c2a; }
    .hidden { display: none; }
    .strength { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Casa Monarca</h1>
      <p>Sistema de gestión institucional</p>
    </div>

    <div id="form-section">
      <h2>Restablecer contraseña</h2>
      <p class="sub">Ingresa tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

      <div id="error" class="alert alert-error hidden"></div>

      <label for="pass1">Nueva contraseña</label>
      <input type="password" id="pass1" autocomplete="new-password">

      <label for="pass2">Confirmar contraseña</label>
      <input type="password" id="pass2" autocomplete="new-password">

      <button id="btn-submit" onclick="resetear()">Restablecer contraseña</button>
    </div>

    <div id="success-section" class="hidden">
      <div class="alert alert-success">
        <strong>Contraseña restablecida.</strong> Ya puedes iniciar sesión con tu nueva contraseña.
      </div>
      <a href="frontend.html" class="back">← Ir al inicio de sesión</a>
    </div>

    <a href="frontend.html" class="back" id="link-back">← Volver al inicio de sesión</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('form-section').innerHTML = `
        <div class="alert alert-error">
          <strong>Enlace inválido.</strong> No se encontró un token de recuperación.
          Solicita un nuevo enlace desde la pantalla de inicio de sesión.
        </div>`;
    }

    async function resetear() {
      const pass1 = document.getElementById('pass1').value;
      const pass2 = document.getElementById('pass2').value;
      const error = document.getElementById('error');
      const btn = document.getElementById('btn-submit');

      error.classList.add('hidden');

      if (!pass1 || !pass2) {
        error.textContent = 'Completa ambos campos.';
        error.classList.remove('hidden');
        return;
      }

      if (pass1.length < 8) {
        error.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        error.classList.remove('hidden');
        return;
      }

      if (pass1 !== pass2) {
        error.textContent = 'Las contraseñas no coinciden.';
        error.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Restableciendo…';

      try {
        const r = await fetch('/api/usuarios/completar-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, nueva_password: pass1 })
        });
        const data = await r.json();

        if (!r.ok) throw new Error(data.error || 'No se pudo restablecer la contraseña');

        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('link-back').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
      } catch (e) {
        error.textContent = e.message;
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Restablecer contraseña';
      }
    }
  </script>
</body>
</html>
